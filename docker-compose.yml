services:
  mysql:
    image: mysql:8.0
    container_name: pa-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: personal_assistant
    volumes:
      - mysql-data:/var/lib/mysql
    ports:
      - "3307:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: pa-backend
    environment:
      DATABASE_URL: mysql+pymysql://root:${DB_PASSWORD}@mysql:3306/personal_assistant?charset=utf8mb4
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: pa-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mysql-data:
